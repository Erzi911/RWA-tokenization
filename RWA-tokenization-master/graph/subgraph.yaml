specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: RWAToken
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: RWAToken
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - MintEvent
        - BurnEvent
      abis:
        - name: RWAToken
          file: ./abis/RWAToken.json
      eventHandlers:
        - event: TokensMinted(indexed address,uint256,indexed address)
          handler: handleTokensMinted
        - event: TokensBurned(indexed address,uint256,indexed address)
          handler: handleTokensBurned
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/token.ts

  - kind: ethereum
    name: RWAVault
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: RWAVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultPosition
        - DepositEvent
        - WithdrawEvent
      abis:
        - name: RWAVault
          file: ./abis/RWAVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
      file: ./src/vault.ts

  - kind: ethereum
    name: RWAGovernor
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: RWAGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: RWAGovernor
          file: ./abis/RWAGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
      file: ./src/governor.ts
