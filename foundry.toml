[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
verbosity = 0

[profile.default.fuzz]
runs = 256
seed = "0x1"

[profile.default.invariant]
runs = 64
depth = 15
call_override = false

[profile.fork]
src = "src"
out = "out"
libs = ["lib"]
test = "test/fork"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
wrap_comments = true

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
base_sepolia     = "${BASE_SEPOLIA_RPC_URL}"
mainnet          = "${MAINNET_RPC_URL}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
base_sepolia     = { key = "${BASESCAN_API_KEY}",  url = "https://api-sepolia.basescan.org/api" }
